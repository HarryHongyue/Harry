name: Auto Rebuild on Release Update

on:
  repository_dispatch:
    types: [release-update]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Build Docker image
        env:
          TAG: ${{ github.sha }}
        run: |
          docker build -t harry-web:${TAG} .
          docker tag harry-web:${TAG} ghcr.io/harryhongyue/harry-web:${TAG}
          docker tag harry-web:${TAG} ghcr.io/harryhongyue/harry-web:latest
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Push Docker image
        env:
          TAG: ${{ github.sha }}
        run: |
          docker push ghcr.io/harryhongyue/harry-web:${TAG}
          docker push ghcr.io/harryhongyue/harry-web:latest
      
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/harry-site
            docker compose pull --ignore-pull-failures
            docker compose up -d
